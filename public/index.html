<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minimal Ollama Chat</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">AI</div>
          <div>
            <h1>Ollama Chat</h1>
            <p>Local LLM chat</p>
          </div>
        </div>

        <button id="newChatBtn" class="secondary-button">New chat / Delete history</button>

        <div class="sidebar-section">
          <h2>History</h2>
          <div id="historyList" class="history-list"></div>
        </div>
      </aside>

      <main class="chat-area">
        <header class="topbar">
          <div>
            <h2>Simple Ollama chat</h2>
            <p id="statusText">Ollama connection check ...</p>
          </div>
          <div class="model-box">
            <label for="modelInput">Model</label>
            <input id="modelInput" type="text" placeholder="llama3.2" />
          </div>
        </header>

        <section id="messages" class="messages" aria-live="polite">
          <div class="empty-state">
            <div class="empty-icon">✦</div>
            <h3>Ask a question</h3>
            <p>answers -> local save<code>data/chat_history.json</code>.</p>
          </div>
        </section>

        <form id="chatForm" class="composer">
          <textarea
            id="messageInput"
            rows="1"
            placeholder="Ask me..."
          ></textarea>
          <button id="sendBtn" type="submit">Send</button>
        </form>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
